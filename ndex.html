<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Human Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: radial-gradient(circle at center, #0a0a0a, #000);
      color: white;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }

    input {
      color: white;
    }

    h2 {
      margin: 0 0 10px;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<div id="ui">
  <h2>Upload Image</h2>
  <input type="file" id="upload">
</div>

<script>
  let scene, camera, renderer, mesh, controls;

  init();
  animate();

  function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // LIGHTS
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    // PARTICLES (background effect)
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 2000;

    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 50;
    }

    particlesGeometry.setAttribute(
      'position',
      new THREE.BufferAttribute(posArray, 3)
    );

    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.02
    });

    const particlesMesh = new THREE.Points(
      particlesGeometry,
      particlesMaterial
    );

    scene.add(particlesMesh);

    // DEFAULT MODEL (sphere placeholder)
    const geometry = new THREE.SphereGeometry(2, 128, 128);

    const material = new THREE.MeshStandardMaterial({
      color: 0x5555ff,
      metalness: 0.5,
      roughness: 0.3,
      displacementScale: 0.2
    });

    mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // CONTROLS (360 rotation)
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // FILE UPLOAD
    document.getElementById("upload").addEventListener("change", handleImage);

    window.addEventListener("resize", onWindowResize);
  }

  function handleImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
      const textureLoader = new THREE.TextureLoader();

      textureLoader.load(e.target.result, function(texture) {
        mesh.material.map = texture;
        mesh.material.displacementMap = texture;
        mesh.material.needsUpdate = true;
      });
    };

    reader.readAsDataURL(file);
  }

  function animate() {
    requestAnimationFrame(animate);

    // 🔁 ROTATION TRANSFORMATION (MAIN PART)
    mesh.rotation.y += 0.01;
    mesh.rotation.x += 0.002;

    controls.update();

    renderer.render(scene, camera);
  }

  function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
</script>

</body>
</html>
